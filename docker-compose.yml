services:
  # PostgreSQL - 关系数据存储
  postgres:
    image: postgres:15-alpine
    container_name: biomed-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biomed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biomed123}
      POSTGRES_DB: ${POSTGRES_DB:-biomed_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biomed}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis - 缓存与会话存储
  redis:
    image: redis:7-alpine
    container_name: biomed-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ChromaDB - 向量数据库（记忆与文献检索）
  chromadb:
    image: chromadb/chroma:latest
    container_name: biomed-chromadb
    ports:
      - "${CHROMA_PORT:-8001}:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - CHROMA_SERVER_AUTH_CREDENTIALS=${CHROMA_AUTH:-}
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token.TokenAuthServerProvider
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # MinIO - 对象存储（视频/结果存储）
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: biomed-minio
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-biomed}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-biomed123}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # Celery Worker - 异步任务处理
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: biomed-celery
    depends_on:
      - redis
      - postgres
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://${POSTGRES_USER:-biomed}:${POSTGRES_PASSWORD:-biomed123}@postgres:5432/${POSTGRES_DB:-biomed_agent}
    volumes:
      - ./src:/app/src
      - celery_data:/app/data
    restart: unless-stopped
    profiles:
      - worker

  # LiteLLM Proxy - 多模型统一接入（可选）
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: biomed-litellm
    ports:
      - "${LITELLM_PORT:-4000}:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-biomed123}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    profiles:
      - litellm

  # Ollama - 本地LLM服务（可选）
  ollama:
    image: ollama/ollama:latest
    container_name: biomed-ollama
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    profiles:
      - ollama

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  minio_data:
  celery_data:
  ollama_data:

networks:
  default:
    name: biomed-network
